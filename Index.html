<!DOCTYPE html>
<html>
<head>
<title>Fun Magic Button</title>

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:Arial;
    overflow:hidden;
}

.box{
    text-align:center;
    color:white;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:#fff;
    color:#764ba2;
    box-shadow:0 0 20px #fff;
}

#text{
    margin-top:30px;
    font-size:35px;
    font-weight:bold;
}

.star{
    position:absolute;
    font-size:30px;
    animation:fall 3s linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(100vh);
    }
}
</style>

</head>

<body>

<div class="box">
<h1>✨ Magic Button ✨</h1>

<button onclick="magic()">Click Me</button>

<div id="text"></div>

</div>


<script>

function magic(){

let msg=[
"🔥 You are Awesome!",
"😎 Keep Smiling!",
"🚀 Never Give Up!",
"✨ Dream Big!",
"😂 আজকে মুড ভালো!"
];

let random=msg[Math.floor(Math.random()*msg.length)];

document.getElementById("text").innerHTML=random;


for(let i=0;i<30;i++){

let s=document.createElement("div");

s.className="star";
s.innerHTML="⭐";

s.style.left=Math.random()*100+"%";
s.style.animationDuration=(Math.random()*2+1)+"s";

document.body.appendChild(s);


setTimeout(()=>{
s.remove();
},3000);

}

}

</script>

</body>
</html>
